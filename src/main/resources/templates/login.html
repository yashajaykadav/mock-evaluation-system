<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mock Evaluation System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h1>📋 EvalFlow</h1>
            <p>Mock Evaluation System</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <div id="errorMessage" class="error-message"></div>

            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                <span class="btn-text">Login</span>
                <span class="btn-loader" style="display:none;">Logging in...</span>
            </button>
        </form>

        <div class="demo-credentials">
            <h4>Demo Credentials</h4>
            <div class="credential-row">
                <span class="role">Admin:</span>
                <span class="creds">admin@example.com / admin123</span>
            </div>
            <div class="credential-row">
                <span class="role">Evaluator:</span>
                <span class="creds">john@example.com / eval123</span>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = loginBtn.querySelector('.btn-text');
        const btnLoader = loginBtn.querySelector('.btn-loader');

        errorDiv.textContent = '';
        errorDiv.style.display = 'none';
        loginBtn.disabled = true;
        btnText.style.display = 'none';
        btnLoader.style.display = 'inline';

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                window.location.href = data.role === 'ADMIN' ? '/admin/dashboard' : '/evaluator/dashboard';
            } else {
                errorDiv.textContent = data.message || 'Invalid credentials';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'An error occurred. Please try again.';
            errorDiv.style.display = 'block';
        } finally {
            loginBtn.disabled = false;
            btnText.style.display = 'inline';
            btnLoader.style.display = 'none';
        }
    });
</script>
</body>
</html>
